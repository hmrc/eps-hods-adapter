# This is the main configuration file for the application.
# ~~~~~

include "backend.conf"

appName=eps-hods-adapter

# Session Timeout
# ~~~~
# The default session timeout for the app is 15 minutes (900seconds).
# Updating this is the responsibility of the app - it must issue a new cookie with each request or the session will
# timeout 15 minutes after login (regardless of user activity).
# session.maxAge=900

# Session configuration
# ~~~~~
application.session.httpOnly=false

application.session.secure=false

# The application languages
# ~~~~~
application.langs="en"

play.ws.useragent = ${appName}

##Modules
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"
play.modules.enabled += "uk.gov.hmrc.hods.module.EpsHodsAdapterModule"

# Router
# ~~~~~
# Define the Router object to use for this application.
# This router will be looked up first when the application is starting up,
# so make sure this is the entry point.
# Furthermore, it's assumed your route file is named properly.
# So for an application router like `my.application.Router`,
# you may need to define a router file `conf/my.application.routes`.
# Default to Routes in the root package (and conf/routes)
play.http.router=prod.Routes

# Evolutions
# ~~~~~
# You can disable evolutions if needed
# evolutionplugin=disabled

# Logger
# ~~~~~
# You can also configure logback (http://logback.qos.ch/), by providing a logger.xml file in the conf directory .

# Root logger:
logger.root=ERROR

# Logger used by the framework:
logger.play=INFO

# Logger provided to your application:
logger.application=DEBUG

# Metrics plugin settings - graphite reporting is configured on a per env basis
metrics {
    enabled = true
}

# Microservice specific config

txmonitoring {
    enabled=true
    traceRequests=true
}

mongodb {
  uri = "mongodb://localhost:27017/paye-notification"
}

microservice {
    services {

        auth {
          host=localhost
          port=8500
          protocol = http
        }

        datastream {
          host=localhost
          port=8100
          protocol = http
        }

        citizen-details {
          host = localhost
          port = 8185  # DIGITAL_CONTACT_STUB
          protocol = http
        }

        eps-message-renderer {
          host = localhost
          port = 9419
          protocol = http
        }
      
        preferences {
          host=localhost
          port=8025
          protocol = http
        }
      
        nps-hod-hip {
          host = localhost
          port = 8185  # ignored, uses wiremock locally
          protocol = http
          originator-id = MDTP-DC-TEST
          client-id = id-local
          client-secret = secret-local
        }
    }
}

scheduling {
  processPayeNotifications {
    taskEnabled = true
    initialDelay = "1 second"
    interval = "1 second"
    retryFailedAfter = 3600 #seconds
  }
}

printSuppression {
  retryInProgressNotificationsAfter = 3600000 #milliseconds
  alertItemTTL = 7 days
}